<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心动坐标 - 同步画板</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .canvas-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .canvas-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .canvas-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #drawing-canvas {
            width: 100%;
            height: 400px;
            border: 2px solid #4ecdc4;
            border-radius: 10px;
            background: white;
            display: block;
            touch-action: none; /* 关键：禁用浏览器默认触摸行为 */
            -webkit-user-select: none;
            user-select: none;
        }
        
        .canvas-section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .canvas-title {
            color: #764ba2;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .canvas-area {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: crosshair;
            touch-action: none; /* 极其重要：禁止浏览器拦截手势 */
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            position: relative;
            z-index: 10; /* 确保画布在最前面 */
        }
        
        .tools-section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        
        .color-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        
        .color-option:hover {
            transform: scale(1.2);
        }
        
        .color-option.active {
            border-color: #333;
            transform: scale(1.2);
        }
        
        .brush-size {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .size-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #333;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
        
        .size-option.active {
            background: #667eea;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .clear-btn {
            background: #ff6b6b;
            color: white;
        }
        
        .clear-btn:hover {
            background: #ff5252;
        }
        
        .save-btn {
            background: #4ecdc4;
            color: white;
        }
        
        .save-btn:hover {
            background: #26a69a;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        .back-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .users-section {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        .user-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .connection-status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
        }
        
        .connected {
            color: #4ecdc4;
        }
        
        .disconnected {
            color: #ff6b6b;
        }
        
        .instructions {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        @media (max-width: 768px) {
            .canvas-area {
                width: 100% !important;
                height: 60vh !important; /* 使用视口高度百分比 */
                max-height: 500px;
                touch-action: none; /* 禁用浏览器默认触摸行为 */
            }
            
            .tools-section {
                flex-direction: column;
                gap: 10px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .action-btn {
                padding: 15px;
                font-size: 1.1em;
            }
            
            .users-section {
                flex-direction: column;
                align-items: center;
            }
            
            .canvas-container {
                padding: 10px;
            }
            
            .canvas-section {
                padding: 15px;
            }
        }
        
        /* 防止移动端双击缩放 */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        /* 画布触摸优化 */
        canvas {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <!-- Header -->
        <div class="canvas-header">
            <h1>🎨 同步画板</h1>
            <p>欢迎，{{ user_name }}！与你的另一半一起创作吧！</p>
            <button class="action-btn back-btn" onclick="window.location.href='/games'">← 返回游戏大厅</button>
        </div>
        
        <!-- Connection Status -->
        <div class="connection-status" id="connection-status">
            <span id="status-text">正在连接...</span>
            <span id="partner-status"></span>
        </div>
        
        <!-- Canvas Area -->
        <div class="canvas-section">
            <h2 class="canvas-title">共同画布</h2>
            <div style="display: flex; justify-content: center; position: relative;">
                <canvas id="drawing-canvas" class="canvas-area" width="800" height="500"></canvas>
                <!-- 透明覆盖层，确保捕获所有触摸事件 -->
                <div id="canvas-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: auto;"></div>
            </div>
            
            <!-- Drawing Tools -->
            <div class="tools-section">
                <div class="color-picker">
                    <span>颜色：</span>
                    <div class="color-option active" style="background-color: #ff6b6b;" data-color="#ff6b6b"></div>
                    <div class="color-option" style="background-color: #4ecdc4;" data-color="#4ecdc4"></div>
                    <div class="color-option" style="background-color: #ffd166;" data-color="#ffd166"></div>
                    <div class="color-option" style="background-color: #764ba2;" data-color="#764ba2"></div>
                    <div class="color-option" style="background-color: #333;" data-color="#333"></div>
                </div>
                
                <div class="brush-size">
                    <span>画笔：</span>
                    <div class="size-option active" data-size="2">小</div>
                    <div class="size-option" data-size="5">中</div>
                    <div class="size-option" data-size="10">大</div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn clear-btn" id="clear-canvas">清空画板</button>
                <button class="action-btn save-btn" id="save-canvas">保存作品</button>
                <button class="action-btn" style="background: #9b59b6;" onclick="location.href='/game/mobile-test'">📱 移动端测试</button>
                <button class="action-btn" style="background: #2ecc71;" onclick="location.href='/game/canvas-simple'">🔄 简化版测试</button>
            </div>
        </div>
        
        <!-- Users Online -->
        <div class="users-section" id="users-section">
            <!-- Users will be dynamically added here -->
        </div>
        
        <!-- Instructions -->
        <div class="instructions">
            <h3>🎯 游戏说明</h3>
            <ul>
                <li>选择颜色和画笔大小开始绘画</li>
                <li>对方的绘画会实时显示在你的画布上</li>
                <li>点击"清空画板"可以重新开始</li>
                <li>点击"保存作品"可以保存你们的共同创作</li>
                <li>需要两人同时在线才能开始游戏</li>
            </ul>
            <div id="mobile-hint" style="display: none; margin-top: 15px; padding: 10px; background: #f0f8ff; border-radius: 8px; border-left: 4px solid #4ecdc4;">
                <strong>📱 移动端提示：</strong>
                <p>使用手指在屏幕上绘画，长按可以绘制更粗的线条。</p>
                <p>如果无法绘画，请尝试轻点屏幕后再开始绘制。</p>
            </div>
        </div>
    </div>
    
    <script>
        // Canvas setup
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentColor = '#ff6b6b';
        let currentBrushSize = 2;
        
        // WebSocket connection
        let ws = null;
        let sessionId = 'default_canvas';
        const userId = '{{ user_id }}';
        const userName = '{{ user_name }}';
        
        // Initialize canvas
        function initCanvas() {
            // Debug: Log canvas dimensions
            console.log('Canvas dimensions:', {
                width: canvas.width,
                height: canvas.height,
                clientWidth: canvas.clientWidth,
                clientHeight: canvas.clientHeight,
                offsetWidth: canvas.offsetWidth,
                offsetHeight: canvas.offsetHeight
            });
            
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // Get overlay element
            const overlay = document.getElementById('canvas-overlay');
            
            // Event listeners for drawing - attach to overlay
            overlay.addEventListener('mousedown', startDrawing);
            overlay.addEventListener('mousemove', draw);
            overlay.addEventListener('mouseup', stopDrawing);
            overlay.addEventListener('mouseout', stopDrawing);
            
            // Touch events for mobile - attach to overlay
            overlay.addEventListener('touchstart', handleTouchStart, {passive: false});
            overlay.addEventListener('touchmove', handleTouchMove, {passive: false});
            overlay.addEventListener('touchend', handleTouchEnd, {passive: false});
            overlay.addEventListener('touchcancel', handleTouchCancel, {passive: false});
            
            // Color picker
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('active'));
                    this.classList.add('active');
                    currentColor = this.dataset.color;
                });
            });
            
            // Brush size
            document.querySelectorAll('.size-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.size-option').forEach(opt => opt.classList.remove('active'));
                    this.classList.add('active');
                    currentBrushSize = parseInt(this.dataset.size);
                });
            });
            
            // Action buttons
            document.getElementById('clear-canvas').addEventListener('click', clearCanvas);
            document.getElementById('save-canvas').addEventListener('click', saveCanvas);
            
            // Connect to WebSocket
            connectWebSocket();
        }
        
        // Drawing functions
        function startDrawing(e) {
            isDrawing = true;
            [lastX, lastY] = getCoordinates(e);
        }
        
        function draw(e) {
            if (!isDrawing) return;
            
            e.preventDefault();
            const [x, y] = getCoordinates(e);
            
            // Draw locally
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentBrushSize;
            ctx.stroke();
            
            // Send drawing data to partner
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'canvas_draw',
                    session_id: sessionId,
                    from_x: lastX,
                    from_y: lastY,
                    to_x: x,
                    to_y: y,
                    color: currentColor,
                    brush_size: currentBrushSize,
                    user_id: userId,
                    user_name: userName
                }));
            }
            
            [lastX, lastY] = [x, y];
        }
        
        function stopDrawing() {
            isDrawing = false;
        }
        
        // Touch handling - fixed for mobile
        function handleTouchStart(e) {
            console.log('Touch start:', e.type, 'touches:', e.touches.length);
            e.preventDefault(); // 阻止滚动和默认行为
            const touch = e.touches[0];
            startDrawing(touch);
            return false;
        }
        
        function handleTouchMove(e) {
            console.log('Touch move:', e.type, 'touches:', e.touches.length);
            e.preventDefault(); // 阻止移动端拉动刷新
            const touch = e.touches[0];
            draw(touch);
            return false;
        }
        
        function handleTouchEnd(e) {
            console.log('Touch end:', e.type);
            e.preventDefault();
            // 某些移动端需要在这里显式结束路径
            stopDrawing();
            return false;
        }
        
        function handleTouchCancel(e) {
            console.log('Touch cancel:', e.type);
            e.preventDefault();
            stopDrawing();
            return false;
        }
        
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
        
            // 判断是触摸事件还是鼠标事件
            if (e.touches && e.touches.length > 0) {
                // 触摸事件 - 使用第一个触摸点
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                console.log('Touch coordinates:', clientX, clientY);
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                // 触摸结束事件
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else if (e.type.includes('touch')) {
                // 其他触摸事件
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    console.log('No valid touch points');
                    return [0, 0]; // 没有有效的触摸点
                }
            } else {
                // 鼠标事件
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            // 计算相对于画布的位置
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            // 确保坐标在画布范围内
            let x = (clientX - rect.left) * scaleX;
            let y = (clientY - rect.top) * scaleY;
            
            // 限制坐标在画布范围内
            x = Math.max(0, Math.min(x, canvas.width));
            y = Math.max(0, Math.min(y, canvas.height));
            
            console.log('Canvas coordinates:', x, y, 'scale:', scaleX, scaleY);
        
            return [x, y];
        }
        
        // Canvas actions
        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'canvas_clear',
                    session_id: sessionId,
                    user_id: userId,
                    user_name: userName
                }));
            }
        }
        
        function saveCanvas() {
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `heartsync_canvas_${new Date().toISOString().split('T')[0]}.png`;
            link.href = dataURL;
            link.click();
            
            // Show success message
            alert('画作已保存！');
        }
        
        // WebSocket functions
        function connectWebSocket() {
            // const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const protocol = 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                console.log('WebSocket connected');
                updateStatus('connected', '已连接到服务器');

                // 1. 必须先发送 auth 消息，否则后端不记录你的 session
                ws.send(JSON.stringify({
                    type: 'auth',
                    user_id: userId,
                    user_name: userName
                }));

                // Join canvas session
                ws.send(JSON.stringify({
                    type: 'canvas_join',
                    session_id: sessionId,
                    user_id: userId,
                    user_name: userName,
                    color: currentColor
                }));
            };
            
            ws.onmessage = function(event) {
                try {
                    const message = JSON.parse(event.data);
                    handleWebSocketMessage(message);
                } catch (error) {
                    console.error('Error parsing WebSocket message:', error);
                }
            };
            
            ws.onclose = function() {
                console.log('WebSocket disconnected');
                updateStatus('disconnected', '连接断开，正在重连...');
                
                // Try to reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
                updateStatus('disconnected', '连接错误');
            };
        }
        
        function handleWebSocketMessage(message) {
            switch (message.type) {
                case 'canvas_users_update':
                    updateUsersList(message.users);
                    break;
                    
                case 'canvas_draw':
                    // Draw partner's drawing
                    if (message.user_id !== userId) {
                        ctx.beginPath();
                        ctx.moveTo(message.from_x, message.from_y);
                        ctx.lineTo(message.to_x, message.to_y);
                        ctx.strokeStyle = message.color;
                        ctx.lineWidth = message.brush_size;
                        ctx.stroke();
                    }
                    break;
                    
                case 'canvas_clear':
                    // Clear canvas if partner cleared it
                    if (message.user_id !== userId) {
                        ctx.fillStyle = 'white';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }
                    break;
                    
                case 'pong':
                    // Keep connection alive
                    break;
                    
                default:
                    console.log('Unknown message type:', message.type);
            }
        }
        
        function updateUsersList(users) {
            const usersSection = document.getElementById('users-section');
            usersSection.innerHTML = '';
            
            Object.values(users).forEach(user => {
                const userBadge = document.createElement('div');
                userBadge.className = 'user-badge';
                userBadge.innerHTML = `
                    <div class="user-color" style="background-color: ${user.color};"></div>
                    <span>${user.name}</span>
                `;
                usersSection.appendChild(userBadge);
            });
            
            // Update partner status
            const partnerStatus = document.getElementById('partner-status');
            const userCount = Object.keys(users).length;
            
            if (userCount > 1) {
                partnerStatus.textContent = `🎨 ${userCount-1} 位伙伴在线`;
                partnerStatus.style.color = '#4ecdc4';
            } else {
                partnerStatus.textContent = '等待伙伴加入...';
                partnerStatus.style.color = '#ff6b6b';
            }
        }
        
        function updateStatus(status, text) {
            const statusElement = document.getElementById('status-text');
            const connectionStatus = document.getElementById('connection-status');
            
            statusElement.textContent = text;
            
            if (status === 'connected') {
                connectionStatus.classList.remove('disconnected');
                connectionStatus.classList.add('connected');
            } else {
                connectionStatus.classList.remove('connected');
                connectionStatus.classList.add('disconnected');
            }
        }
        
        // Detect mobile device
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                   (navigator.maxTouchPoints && navigator.maxTouchPoints > 2);
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, initializing canvas...');
            
            // Test event listeners
            const overlay = document.getElementById('canvas-overlay');
            if (overlay) {
                console.log('Overlay found:', overlay);
                console.log('Overlay dimensions:', overlay.offsetWidth, 'x', overlay.offsetHeight);
            } else {
                console.error('Overlay not found!');
            }
            
            // Add mobile-specific optimizations
            if (isMobileDevice()) {
                console.log('Mobile device detected, applying optimizations...');
                
                // Show mobile hint
                const mobileHint = document.getElementById('mobile-hint');
                if (mobileHint) {
                    mobileHint.style.display = 'block';
                }
                
                // Adjust canvas size for mobile
                const canvas = document.getElementById('drawing-canvas');
                const container = canvas.parentElement;
                const containerWidth = container.clientWidth;
                
                // Set canvas size based on container (但保持比例)
                canvas.width = Math.min(containerWidth, 800);
                canvas.height = Math.min(containerWidth * 0.7, 500);
                
                // Also adjust overlay size
                if (overlay) {
                    overlay.style.width = canvas.width + 'px';
                    overlay.style.height = canvas.height + 'px';
                }
                
                // Add touch-friendly brush sizes
                const brushSizes = document.querySelector('.brush-size');
                if (brushSizes) {
                    // Make brush size buttons larger for touch
                    document.querySelectorAll('.size-option').forEach(btn => {
                        btn.style.padding = '15px';
                        btn.style.fontSize = '14px';
                    });
                }
            }
            
            initCanvas();
            
            // Add a test touch event
            if (isMobileDevice()) {
                setTimeout(() => {
                    console.log('Mobile initialization complete. Try drawing on the canvas.');
                    alert('移动端初始化完成！请尝试在画布上绘制。如果无法绘制，请检查控制台日志。');
                }, 1000);
            }
        });
        
        // Keep connection alive
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }, 30000);
        
        // Debug touch events (only in development) - REMOVED to avoid interference
    </script>
</body>
</html>
