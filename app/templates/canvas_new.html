<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心动坐标 - 同步画板</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            touch-action: manipulation;
        }
        
        .canvas-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .canvas-header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }
        
        .canvas-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .canvas-header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1em;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .connection-status {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        .connected {
            color: #4ecdc4;
            font-weight: bold;
        }
        
        .disconnected {
            color: #ff6b6b;
        }
        
        .canvas-section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .canvas-title {
            color: #764ba2;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.8em;
        }
        
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        #drawing-canvas {
            border: 3px solid #4ecdc4;
            border-radius: 15px;
            background: white;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        /* PC端竖长画板 */
        @media (min-width: 769px) {
            #drawing-canvas {
                width: 600px;
                height: 800px;
            }
        }
        
        /* 移动端自适应 */
        @media (max-width: 768px) {
            #drawing-canvas {
                width: 100%;
                height: 60vh;
                max-height: 500px;
            }
            
            .canvas-section {
                padding: 20px;
            }
            
            .canvas-header h1 {
                font-size: 2em;
            }
        }
        
        .tools-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }
        
        .color-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s;
        }
        
        .color-option:hover {
            transform: scale(1.1);
        }
        
        .color-option.active {
            border-color: #333;
            transform: scale(1.2);
        }
        
        .brush-size {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .size-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .size-option.active {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
            min-width: 150px;
        }
        
        .clear-btn {
            background: #ff6b6b;
            color: white;
        }
        
        .clear-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }
        
        .save-btn {
            background: #4ecdc4;
            color: white;
        }
        
        .save-btn:hover {
            background: #26a69a;
            transform: translateY(-2px);
        }
        
        .test-btn {
            background: #9b59b6;
            color: white;
        }
        
        .test-btn:hover {
            background: #8e44ad;
            transform: translateY(-2px);
        }
        
        .users-section {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        .user-color {
            width: 25px;
            height: 25px;
            border-radius: 50%;
        }
        
        .instructions {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        .instructions h3 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .instructions ul {
            list-style: none;
            padding-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 10px;
            padding-left: 10px;
            position: relative;
        }
        
        .instructions li:before {
            content: "•";
            color: #4ecdc4;
            font-size: 1.5em;
            position: absolute;
            left: -15px;
            top: -5px;
        }
        
        .mobile-hint {
            margin-top: 20px;
            padding: 15px;
            background: #f0f8ff;
            border-radius: 10px;
            border-left: 5px solid #4ecdc4;
            display: none;
        }
        
        .log {
            background: #333;
            color: #0f0;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            height: 150px;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 14px;
            display: none; /* 默认隐藏日志 */
        }
        
        .debug-toggle {
            text-align: center;
            margin: 10px 0;
        }
        
        .debug-btn {
            background: #34495e;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <!-- Header -->
        <div class="canvas-header">
            <h1>🎨 同步画板</h1>
            <p>欢迎，{{ user_name }}！与你的另一半一起创作吧！</p>
            <a href="/games" class="back-btn">← 返回游戏大厅</a>
        </div>
        
        <!-- Connection Status -->
        <div class="connection-status" id="connection-status">
            <span id="status-text">正在连接服务器...</span>
            <span id="partner-status"></span>
        </div>
        
        <!-- Canvas Area -->
        <div class="canvas-section">
            <h2 class="canvas-title">共同画布</h2>
            <div class="canvas-wrapper">
                <canvas id="drawing-canvas"></canvas>
            </div>
            
            <!-- Drawing Tools -->
            <div class="tools-section">
                <div class="color-picker">
                    <span style="font-weight: bold; color: #333;">颜色：</span>
                    <div class="color-option active" style="background-color: #ff6b6b;" data-color="#ff6b6b"></div>
                    <div class="color-option" style="background-color: #4ecdc4;" data-color="#4ecdc4"></div>
                    <div class="color-option" style="background-color: #ffd166;" data-color="#ffd166"></div>
                    <div class="color-option" style="background-color: #764ba2;" data-color="#764ba2"></div>
                    <div class="color-option" style="background-color: #333;" data-color="#333"></div>
                </div>
                
                <div class="brush-size">
                    <span style="font-weight: bold; color: #333;">画笔：</span>
                    <div class="size-option active" data-size="2">小</div>
                    <div class="size-option" data-size="5">中</div>
                    <div class="size-option" data-size="10">大</div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn clear-btn" id="clear-canvas">清空画板</button>
                <button class="action-btn save-btn" id="save-canvas">保存作品</button>
                <button class="action-btn test-btn" onclick="toggleDebug()">🔧 调试模式</button>
            </div>
        </div>
        
        <!-- Users Online -->
        <div class="users-section" id="users-section">
            <!-- Users will be dynamically added here -->
        </div>
        
        <!-- Instructions -->
        <div class="instructions">
            <h3>🎯 游戏说明</h3>
            <ul>
                <li>选择颜色和画笔大小开始绘画</li>
                <li>对方的绘画会实时显示在你的画布上</li>
                <li>点击"清空画板"可以重新开始</li>
                <li>点击"保存作品"可以保存你们的共同创作</li>
                <li>需要两人同时在线才能开始游戏</li>
            </ul>
            <div class="mobile-hint" id="mobile-hint">
                <strong>📱 移动端提示：</strong>
                <p>使用手指在屏幕上绘画，长按可以绘制更粗的线条。</p>
                <p>如果无法绘画，请尝试轻点屏幕后再开始绘制。</p>
            </div>
        </div>
        
        <!-- Debug Log (hidden by default) -->
        <div class="debug-toggle">
            <button class="debug-btn" onclick="toggleDebug()">显示/隐藏调试日志</button>
        </div>
        <div class="log" id="event-log"></div>
    </div>
    
    <script>
        // ==================== 画板核心功能 ====================
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        
        // 画板状态
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let currentColor = '#ff6b6b';
        let currentBrushSize = 2;
        
        // WebSocket连接
        let ws = null;
        let sessionId = 'default_canvas';
        const userId = '{{ user_id }}';
        const userName = '{{ user_name }}';
        
        // ==================== 设备检测 ====================
        function detectDevice() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const hasTouch = 'ontouchstart' in window;
            
            // 显示移动端提示
            if (isMobile || hasTouch) {
                document.getElementById('mobile-hint').style.display = 'block';
            }
            
            return { isMobile, hasTouch };
        }
        
        // ==================== 事件日志 ====================
        const eventLog = document.getElementById('event-log');
        function logEvent(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}\n`;
            eventLog.textContent += logEntry;
            eventLog.scrollTop = eventLog.scrollHeight;
        }
        
        function toggleDebug() {
            const log = document.getElementById('event-log');
            log.style.display = log.style.display === 'none' ? 'block' : 'none';
        }
        
        // ==================== 画板初始化 ====================
        function initCanvas() {
            const deviceInfo = detectDevice();
            logEvent(`设备检测: 移动设备=${deviceInfo.isMobile}, 触摸支持=${deviceInfo.hasTouch}`);
            
            // 设置画布尺寸
            const container = canvas.parentElement;
            const containerWidth = container.clientWidth;
            
            if (deviceInfo.isMobile) {
                // 移动端：自适应宽度，保持比例
                canvas.width = Math.min(containerWidth, 800);
                canvas.height = Math.min(containerWidth * 0.7, 500);
            } else {
                // PC端：竖长画板
                canvas.width = 600;
                canvas.height = 800;
            }
            
            logEvent(`画板尺寸: ${canvas.width}x${canvas.height}`);
            
            // 清空画布
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 设置绘制样式
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentBrushSize;
            
            // 设置事件监听器
            setupEventListeners();
            
            // 连接WebSocket
            connectWebSocket();
        }
        
        // ==================== 事件监听器设置 ====================
        function setupEventListeners() {
            // 鼠标事件
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // 触摸事件
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchCancel, { passive: false });
            
            // 颜色选择
            document.querySelectorAll('.color-option').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.color-option').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentColor = this.dataset.color;
                    ctx.strokeStyle = currentColor;
                    logEvent(`颜色切换: ${currentColor}`);
                });
            });
            
            // 画笔大小
            document.querySelectorAll('.size-option').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.size-option').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentBrushSize = parseInt(this.dataset.size);
                    ctx.lineWidth = currentBrushSize;
                    logEvent(`画笔大小: ${currentBrushSize}`);
                });
            });
            
            // 清空按钮
            document.getElementById('clear-canvas').addEventListener('click', function() {
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 发送清空消息给伙伴
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'canvas_clear',
                        session_id: sessionId,
                        user_id: userId,
                        user_name: userName
                    }));
                }
                
                logEvent('画板已清空');
            });
            
            // 保存按钮
            document.getElementById('save-canvas').addEventListener('click', function() {
                const dataURL = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `heartsync_canvas_${new Date().toISOString().split('T')[0]}.png`;
                link.href = dataURL;
                link.click();
                logEvent('画作已保存');
            });
            
            logEvent('事件监听器已设置');
        }
        
        // ==================== 绘制函数 ====================
        function startDrawing(e) {
            e.preventDefault();
            isDrawing = true;
            const coords = getCoordinates(e);
            [lastX, lastY] = coords;
            logEvent(`开始绘制: (${lastX.toFixed(1)}, ${lastY.toFixed(1)})`);
        }
        
        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const coords = getCoordinates(e);
            const [x, y] = coords;
            
            // 本地绘制
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            
            // 发送绘制数据给伙伴
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'canvas_draw',
                    session_id: sessionId,
                    from_x: lastX,
                    from_y: lastY,
                    to_x: x,
                    to_y: y,
                    color: currentColor,
                    brush_size: currentBrushSize,
                    user_id: userId,
                    user_name: userName
                }));
            }
            
            logEvent(`绘制到: (${x.toFixed(1)}, ${y.toFixed(1)})`);
            
            [lastX, lastY] = [x, y];
        }
        
        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                logEvent('结束绘制');
            }
        }
        
        // ==================== 触摸事件处理 ====================
        function handleTouchStart(e) {
            logEvent(`触摸开始: ${e.touches.length} 个触点`);
            startDrawing(e);
        }
        
        function handleTouchMove(e) {
            logEvent(`触摸移动: ${e.touches.length} 个触点`);
            draw(e);
        }
        
        function handleTouchEnd(e) {
            logEvent('触摸结束');
            stopDrawing();
        }
        
        function handleTouchCancel(e) {
            logEvent('触摸取消');
            stopDrawing();
        }
        
        // ==================== 坐标计算 ====================
        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            // 计算画布坐标
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;
            
            return [x, y];
        }
        
        // ==================== WebSocket功能 ====================
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                logEvent('WebSocket连接已建立');
                updateStatus('connected', '✅ 已连接到服务器');
                
                // 1. 必须先发送 auth 消息，否则后端不记录你的 session
                ws.send(JSON.stringify({
                    type: 'auth',
                    user_id: userId,
                    user_name: userName
                }));

                // 加入画板会话
                ws.send(JSON.stringify({
                    type: 'canvas_join',
                    session_id: sessionId,
                    user_id: userId,
                    user_name: userName,
                    color: currentColor
                }));
            };
            
            ws.onmessage = function(event) {
                try {
                    const message = JSON.parse(event.data);
                    handleWebSocketMessage(message);
                } catch (error) {
                    logEvent(`消息解析错误: ${error}`);
                }
            };
            
            ws.onclose = function() {
                logEvent('WebSocket连接已关闭');
                updateStatus('disconnected', '❌ 连接断开，正在重连...');
                
                // 3秒后重连
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = function(error) {
                logEvent(`WebSocket错误: ${error}`);
                updateStatus('disconnected', '❌ 连接错误');
            };
        }
        
        function handleWebSocketMessage(message) {
            switch (message.type) {
                case 'canvas_users_update':
                    updateUsersList(message.users);
                    break;
                    
                case 'canvas_draw':
                    // 绘制伙伴的绘画
                    if (message.user_id !== userId) {
                        ctx.beginPath();
                        ctx.moveTo(message.from_x, message.from_y);
                        ctx.lineTo(message.to_x, message.to_y);
                        ctx.strokeStyle = message.color;
                        ctx.lineWidth = message.brush_size;
                        ctx.stroke();
                        logEvent(`收到伙伴绘制: ${message.user_name}`);
                    }
                    break;
                    
                case 'canvas_cleared':
                    // 伙伴清空了画板
                    if (message.user_id !== userId) {
                        ctx.fillStyle = 'white';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        logEvent(`伙伴清空了画板: ${message.user_name}`);
                    }
                    break;
                    
                case 'pong':
                    // 心跳响应
                    break;
                    
                default:
                    logEvent(`未知消息类型: ${message.type}`);
            }
        }
        
        function updateUsersList(users) {
            const usersSection = document.getElementById('users-section');
            usersSection.innerHTML = '';
            
            Object.values(users).forEach(user => {
                const userBadge = document.createElement('div');
                userBadge.className = 'user-badge';
                userBadge.innerHTML = `
                    <div class="user-color" style="background-color: ${user.color};"></div>
                    <span style="font-weight: bold;">${user.name}</span>
                    <span style="font-size: 0.9em; color: #4ecdc4;">● 在线</span>
                `;
                usersSection.appendChild(userBadge);
            });
            
            // 更新伙伴状态
            const partnerStatus = document.getElementById('partner-status');
            const userCount = Object.keys(users).length;
            
            if (userCount > 1) {
                partnerStatus.textContent = ` 👥 ${userCount-1} 位伙伴在线`;
                partnerStatus.style.color = '#4ecdc4';
            } else {
                partnerStatus.textContent = ' ⏳ 等待伙伴加入...';
                partnerStatus.style.color = '#ff6b6b';
            }
        }
        
        function updateStatus(status, text) {
            const statusElement = document.getElementById('status-text');
            const connectionStatus = document.getElementById('connection-status');
            
            statusElement.textContent = text;
            
            if (status === 'connected') {
                connectionStatus.classList.remove('disconnected');
                connectionStatus.classList.add('connected');
            } else {
                connectionStatus.classList.remove('connected');
                connectionStatus.classList.add('disconnected');
            }
        }
        
        // ==================== 页面初始化 ====================
        window.addEventListener('load', function() {
            logEvent('页面加载完成');
            initCanvas();
            
            // 窗口大小变化时重新初始化
            window.addEventListener('resize', function() {
                logEvent('窗口大小变化，重新初始化画板');
                initCanvas();
            });
            
            // 心跳保持连接
            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping' }));
                }
            }, 30000);
            
            // 初始提示
            const deviceInfo = detectDevice();
            if (deviceInfo.isMobile) {
                setTimeout(() => {
                    alert('🎨 同步画板已就绪！\n\n使用手指在画布上绘制，你的绘画会实时同步给伙伴。\n\n如果遇到问题，请点击"调试模式"查看日志。');
                }, 1000);
            }
        });
    </script>
</body>
</html>
