<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心动农场</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; --accent: #ff6b6b; --gold: #f0a500; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            font-family: 'Arial', sans-serif;
            user-select: none; -webkit-user-select: none;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        #game-outer {
            display: flex; flex-direction: column;
            width: 800px;
            margin-top: 10px;
        }

        /* 顶栏 */
        #top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 14px;
            background: #2a2a4a;
            border-radius: 10px 10px 0 0;
            color: white;
            border: 1px solid #444;
            border-bottom: none;
        }
        #coins-display {
            display: flex; align-items: center; gap: 6px;
            font-size: 17px; font-weight: bold; color: #f0a500;
        }
        #coins-display .coin-icon { font-size: 20px; }
        #top-buttons { display: flex; gap: 6px; }
        #top-buttons button, #top-buttons .home-link {
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            color: #ccc; cursor: pointer;
            font-size: 12px; transition: all 0.2s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 3px;
        }
        #top-buttons button:hover, #top-buttons .home-link:hover {
            background: rgba(255,255,255,0.18); color: #fff;
        }
        .btn-checkin { border-color: #f0a500 !important; color: #f0a500 !important; }
        .btn-diary { border-color: #667eea !important; color: #a0b0ff !important; }

        /* 游戏容器 */
        #game-container {
            width: 800px; height: 520px;
            border-left: 1px solid #444; border-right: 1px solid #444;
            position: relative; overflow: hidden; background: #111;
        }
        #game-container canvas { display: block; }

        /* HUD覆盖层 */
        #hud-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 10;
        }

        /* Toast */
        #toast {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            padding: 8px 18px;
            background: rgba(0,0,0,0.85); color: #fff;
            border-radius: 16px; font-size: 13px;
            white-space: nowrap; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
        }
        #toast.show { opacity: 1; }

        /* 弹窗 */
        .modal-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none; justify-content: center; align-items: center;
            z-index: 20; pointer-events: auto;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #2a2a4a; border: 1px solid #555;
            border-radius: 12px; padding: 18px;
            max-width: 400px; width: 90%; max-height: 75%;
            overflow-y: auto; color: white;
        }
        .modal-box h3 { margin-bottom: 10px; font-size: 16px; text-align: center; }
        .item-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 10px; background: rgba(255,255,255,0.05);
            border-radius: 8px; gap: 8px;
        }
        .item-row .item-info { flex: 1; min-width: 0; }
        .item-row .item-name { font-weight: bold; font-size: 13px; }
        .item-row .item-desc { font-size: 11px; color: #999; }
        .item-row .item-price { color: #f0a500; font-size: 12px; }
        .btn-sm {
            padding: 3px 10px; border-radius: 10px; border: none;
            cursor: pointer; font-size: 12px; transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-buy { background: #51cf66; color: white; }
        .btn-buy:hover { background: #40c057; }
        .btn-sell { background: #f0a500; color: white; }
        .btn-sell:hover { background: #e09900; }
        .btn-plant { background: #667eea; color: white; }
        .btn-plant:hover { background: #5568d3; }
        .btn-close {
            display: block; margin: 12px auto 0;
            padding: 6px 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08); color: #ccc;
            cursor: pointer; font-size: 13px;
        }
        .btn-close:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .locked { opacity: 0.4; }
        .locked-label { font-size: 10px; color: #f0a500; }

        /* 钓鱼小游戏 */
        #fishing-game {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none; justify-content: center; align-items: center;
            z-index: 25; pointer-events: auto;
        }
        #fishing-game.show { display: flex; }
        .fishing-panel {
            background: #1a3a5c; border: 2px solid #3388cc;
            border-radius: 16px; padding: 20px 30px;
            text-align: center; color: white; width: 320px;
        }
        .fishing-title { font-size: 18px; margin-bottom: 12px; }
        .fishing-bar-wrapper {
            position: relative; width: 60px; height: 200px;
            margin: 0 auto 12px;
            background: rgba(0,0,0,0.4); border: 1px solid #555;
            border-radius: 8px; overflow: hidden;
        }
        #fishing-target {
            position: absolute; left: 0; right: 0;
            height: 36px;
            background: linear-gradient(180deg, #33cc55, #229944);
            border-radius: 4px; transition: none;
            box-shadow: 0 0 8px rgba(51,204,85,0.5);
        }
        #fishing-float {
            position: absolute; left: 10%; right: 10%;
            width: 80%; height: 18px;
            background: linear-gradient(180deg, #ff9944, #cc6622);
            border-radius: 9px; transition: none;
            box-shadow: 0 0 6px rgba(255,153,68,0.6);
        }
        #fishing-progress-bg {
            width: 100%; height: 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 5px; overflow: hidden;
        }
        #fishing-progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #33cc55, #55ee77);
            border-radius: 5px; transition: width 0.1s linear;
        }
        .fishing-hint {
            margin-top: 10px; font-size: 13px; color: #aaccdd;
        }
        #fishing-result {
            display: none; flex-direction: column; align-items: center; gap: 8px;
            margin-top: 10px;
        }
        #fishing-result .fish-name { font-size: 20px; font-weight: bold; color: #ffdd44; }
    </style>
</head>
<body>
    <div id="game-outer">
        <!-- 顶栏 -->
        <div id="top-bar">
            <div id="coins-display"><span class="coin-icon">🪙</span><span id="coins-value">0</span></div>
            <div id="top-buttons">
                <button class="btn-checkin" onclick="claimCheckinReward()">📅签到</button>
                <button class="btn-diary" onclick="claimDiaryReward()">📝日记</button>
                <button onclick="openShopModal()">🏪商店</button>
                <a href="/" class="home-link">🏠</a>
            </div>
        </div>

        <!-- 游戏画布 -->
        <div id="game-container">
            <div id="hud-overlay">
                <div id="toast"></div>
                <!-- 弹窗 -->
                <div id="shop-modal" class="modal-overlay">
                    <div class="modal-box">
                        <h3>🏪 种子商店</h3>
                        <div id="shop-items" class="item-list"></div>
                        <button class="btn-close" onclick="closeShopModal()">关闭</button>
                    </div>
                </div>
                <div id="inventory-modal" class="modal-overlay">
                    <div class="modal-box">
                        <h3>🎒 背包</h3>
                        <div id="inventory-items" class="item-list"></div>
                        <button class="btn-close" onclick="closeInventoryModal()">关闭</button>
                    </div>
                </div>
                <div id="seed-modal" class="modal-overlay">
                    <div class="modal-box">
                        <h3>🌱 选择种子</h3>
                        <div id="seed-items" class="item-list"></div>
                        <button class="btn-close" onclick="closeSeedModal()">取消</button>
                    </div>
                </div>
                <div id="fishing-game">
                    <div class="fishing-panel">
                        <div class="fishing-title">🎣 钓鱼中...</div>
                        <div class="fishing-bar-wrapper">
                            <div id="fishing-target"></div>
                            <div id="fishing-float"></div>
                        </div>
                        <div id="fishing-progress-bg"><div id="fishing-progress-fill"></div></div>
                        <div class="fishing-hint" id="fishing-hint">🖱️ 按住鼠标让浮漂保持在绿色区域！</div>
                        <button class="btn-close" id="fishing-cancel-btn" onclick="cancelFishing()" style="margin-top:8px;">取消钓鱼</button>
                        <div id="fishing-result">
                            <div class="fish-name" id="caught-fish-name"></div>
                            <button class="btn-close" onclick="closeFishingGame()">收杆</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底栏 -->
        <div id="bottom-bar">
            <button id="tool-hoe" class="active" onclick="setTool('hoe')" title="锄头-开垦">🔨</button>
            <button id="tool-water" onclick="setTool('water')" title="水壶-浇水">💧</button>
            <button id="tool-seed" onclick="setTool('seed')" title="种子-种植">🌱</button>
            <button id="tool-fish" onclick="setTool('fish')" title="鱼竿-钓鱼">🎣</button>
            <button id="tool-harvest" onclick="setTool('harvest')" title="收获">🧺</button>
            <span class="spacer"></span>
            <button onclick="openInventoryModal()" title="背包">🎒</button>
        </div>
    </div>

    <script>
        window.FARM_DATA = {
            userId: {{ user_id }},
            userName: "{{ user_name }}",
            coins: 100, plots: {}, plants: {}, fish: {}, inventory: {},
            unlockedPlants: [], currentTool: 'hoe', targetPlotIndex: null, isFishing: false
        };
    </script>
    <script src="/static/js/farm-game.js"></script>
</body>
</html>
